version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_command_center_api
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ai_command_center_celery
    env_file:
      - ../.env
    command: celery -A app.background.workers.celery_app worker --loglevel=info
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: ai_command_center_postgres
    environment:
      POSTGRES_DB: ai_command_center_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: ai_command_center_redis
    ports:
      - "6379:6379"

volumes:
  pg_data:
